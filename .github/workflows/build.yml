name: Build RadioKit Regia

on:
  push:
    branches: [main, develop]
    paths:
      - 'flutter/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter/**'
  workflow_dispatch:
  release:
    types: [created]

env:
  FLUTTER_VERSION: '3.22.x'
  WORKING_DIR: flutter

jobs:
  android:
    name: Android build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Bootstrap native folders if missing
        run: |
          if [ ! -d android ]; then
            echo "Generating android/ folder..."
            flutter create --platforms=android --org com.radiokit --project-name radiokit_regia .
          fi
          # flutter create rigenera test/widget_test.dart che referenzia MyApp.
          # Sostituiamo con un test minimo che usa la classe vera.
          mkdir -p test
          cat > test/widget_test.dart <<'EOF'
          import 'package:flutter_test/flutter_test.dart';
          void main() {
            test('placeholder', () { expect(1 + 1, 2); });
          }
          EOF
          # Bump Kotlin Gradle plugin: il template Flutter 3.22 usa 1.7.10.
          # Le deps androidx moderne usano kotlin-stdlib con metadata 2.2.0,
          # quindi serve compilatore Kotlin 2.x. Usiamo 2.0.21 (stabile).
          if [ -f android/settings.gradle ]; then
            sed -i -E 's#("org\.jetbrains\.kotlin\.android"\s+version\s+")[0-9.]+(")#\12.0.21\2#' android/settings.gradle
            echo "--- patched android/settings.gradle ---"
            grep -E "kotlin\.android" android/settings.gradle || true
          fi
          # SDK levels coerenti con le deps moderne
          if [ -f android/app/build.gradle ]; then
            sed -i -E 's#compileSdkVersion\s+[0-9]+#compileSdkVersion 34#' android/app/build.gradle
            sed -i -E 's#targetSdkVersion\s+[0-9]+#targetSdkVersion 34#' android/app/build.gradle
            sed -i -E 's#minSdkVersion\s+[a-zA-Z0-9.]+#minSdkVersion 23#' android/app/build.gradle
            # Forza tutte le kotlin-stdlib a 2.0.21 per evitare conflitti binari
            if ! grep -q "resolutionStrategy.force.*kotlin-stdlib" android/app/build.gradle; then
              cat >> android/app/build.gradle <<'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:2.0.21'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.0.21'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.0.21'
              }
          }
          EOF
            fi
            # Allinea JVM target Java + Kotlin a 17 (AGP 8.x).
            # Sed prima sui valori esistenti, poi injection se mancanti.
            sed -i -E 's#sourceCompatibility\s+JavaVersion\.VERSION_[0-9_]+#sourceCompatibility JavaVersion.VERSION_17#' android/app/build.gradle
            sed -i -E 's#targetCompatibility\s+JavaVersion\.VERSION_[0-9_]+#targetCompatibility JavaVersion.VERSION_17#' android/app/build.gradle
            sed -i -E "s#jvmTarget\s*=\s*['\"][0-9._]+['\"]#jvmTarget = '17'#" android/app/build.gradle
          fi
          # Disattiva il check di inconsistenza JVM target (warning invece di error).
          # Questo evita il fail "compileJavaWithJavac (1.8) vs compileKotlin (17)"
          # senza dover toccare ogni Gradle file dei plugin Flutter.
          mkdir -p android
          if [ -f android/gradle.properties ]; then
            if ! grep -q "jvm.target.validation.mode" android/gradle.properties; then
              echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties
            fi
          else
            echo "kotlin.jvm.target.validation.mode=warning" > android/gradle.properties
          fi
          # Inject globale: forza Java + Kotlin target su tutti i subprojects.
          # PREPEND (top of file) così l'afterEvaluate viene registrato PRIMA
          # che i subprojects vengano valutati.
          if [ -f android/build.gradle ] && ! grep -q "RADIOKIT_TOOLCHAIN_OVERRIDE" android/build.gradle; then
            cat > /tmp/toolchain_override.gradle <<'EOF'
          // RADIOKIT_TOOLCHAIN_OVERRIDE — forza JVM 17 su tutti i subprojects
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileOptions {
                              sourceCompatibility JavaVersion.VERSION_17
                              targetCompatibility JavaVersion.VERSION_17
                          }
                      }
                  }
                  project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                      kotlinOptions {
                          jvmTarget = '17'
                      }
                  }
              }
          }

          EOF
            cat /tmp/toolchain_override.gradle android/build.gradle > /tmp/build.gradle.new
            mv /tmp/build.gradle.new android/build.gradle
          fi
          echo "--- gradle.properties ---"
          cat android/gradle.properties || true
          echo "--- android/build.gradle tail ---"
          tail -30 android/build.gradle || true
          # Bump anche Android Gradle Plugin se necessario (Flutter 3.22 usa 7.3)
          if [ -f android/settings.gradle ]; then
            sed -i -E 's#("com\.android\.application"\s+version\s+")[0-9.]+(")#\18.1.4\2#' android/settings.gradle
            echo "--- patched AGP version ---"
            grep -E "com\.android\.application" android/settings.gradle || true
          fi
          # Aggiorna Gradle wrapper a versione compatibile con AGP 8.1
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i -E 's#gradle-[0-9.]+-all\.zip#gradle-8.4-all.zip#' android/gradle/wrapper/gradle-wrapper.properties
            cat android/gradle/wrapper/gradle-wrapper.properties
          fi

      - run: flutter pub get
      - name: Generate launcher icons
        run: |
          if [ -f assets/icons/app_icon.png ]; then
            flutter pub run flutter_launcher_icons || \
              dart run flutter_launcher_icons || true
          else
            echo "No icon source — skipping"
          fi
      - run: flutter analyze --no-fatal-infos
      - name: Run tests
        run: flutter test || echo "no tests yet"

      # Decode keystore (only on release/tag)
      - name: Decode Android keystore
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.keystore
          EOF
          fi

      - name: Build APK debug
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --debug

      - name: Build App Bundle release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: flutter build appbundle --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/*.apk
            ${{ env.WORKING_DIR }}/build/app/outputs/bundle/release/*.aab
          if-no-files-found: ignore

  ios:
    name: iOS build
    runs-on: macos-14
    # ⏸ iOS in pausa — riabilitare quando avremo i certificati Apple pronti.
    # Per riattivare: rimuovere la riga sotto.
    if: false
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Bootstrap native folders if missing
        run: |
          if [ ! -d ios ]; then
            echo "Generating ios/ folder..."
            flutter create --platforms=ios --org com.radiokit --project-name radiokit_regia .
          fi

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

      - name: Pod install
        run: cd ios && pod install --repo-update || true

      - name: Build iOS (no codesign on PR/push)
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v')
        run: flutter build ios --no-codesign --debug

      # Release: importa certificati App Store Connect via API key
      - name: Decode App Store Connect key
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          ASC_KEY_B64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_B64" | base64 -d > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Build IPA release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist || \
          flutter build ipa --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ${{ env.WORKING_DIR }}/build/ios/ipa/*.ipa
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Deploy: pubblica build su radiokit.io VPS dopo che android+ios
  # sono passati. Stessi pattern delle altre app (Diretta, Timer).
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to radiokit.io
    # iOS in pausa — il deploy parte appena Android è verde.
    needs: [android]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: dist/android

      # iOS in pausa — riabilitare quando il job ios diventa attivo.
      # - name: Download iOS artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: ios-build
      #     path: dist/ios
      #   continue-on-error: true

      - name: Compute version metadata
        id: meta
        run: |
          VERSION=$(grep '^version:' flutter/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD_NUM=$(grep '^version:' flutter/pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          CHANNEL="beta"
          if [ "${{ github.event_name }}" = "release" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            CHANNEL="stable"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUM"  >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL"  >> $GITHUB_OUTPUT
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Generate release manifest
        run: |
          mkdir -p dist
          # Flat-search ricorsiva: l'artifact preserva la dir tree (flutter/build/...)
          APK=$(find dist/android -type f -name '*.apk' 2>/dev/null | head -1 || true)
          AAB=$(find dist/android -type f -name '*.aab' 2>/dev/null | head -1 || true)
          IPA=$(find dist/ios     -type f -name '*.ipa' 2>/dev/null | head -1 || true)
          echo "Detected APK: $APK"
          echo "Detected AAB: $AAB"
          echo "Detected IPA: $IPA"
          cat > dist/latest.json <<EOF
          {
            "product": "radiokit-regia",
            "version": "${{ steps.meta.outputs.version }}",
            "build":   "${{ steps.meta.outputs.build }}",
            "channel": "${{ steps.meta.outputs.channel }}",
            "released_at": "${{ steps.meta.outputs.ts }}",
            "android_apk": "$(basename "${APK:-}")",
            "android_aab": "$(basename "${AAB:-}")",
            "ios_ipa":     "$(basename "${IPA:-}")",
            "commit":  "${{ github.sha }}"
          }
          EOF
          cat dist/latest.json

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.RADIOKIT_VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.RADIOKIT_VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to VPS
        env:
          VPS_USER: ${{ secrets.RADIOKIT_VPS_USER }}
          VPS_HOST: ${{ secrets.RADIOKIT_VPS_HOST }}
          REMOTE_DIR: /var/www/radiokit.io/downloads/regia
        run: |
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" "mkdir -p $REMOTE_DIR/v${{ steps.meta.outputs.version }}"
          # Carica binari versionati — find ricorsivo perché l'artifact preserva la dir tree.
          # Rinomina al volo a nome canonico (radiokit_regia.apk/.aab/.ipa) per URL stabili.
          find dist -type f \( -name '*.apk' -o -name '*.aab' -o -name '*.ipa' \) | while read f; do
            ext="${f##*.}"
            target="radiokit_regia.${ext}"
            scp -i ~/.ssh/id_ed25519 "$f" "$VPS_USER@$VPS_HOST:$REMOTE_DIR/v${{ steps.meta.outputs.version }}/$target"
            echo "Uploaded: $f → $target"
          done
          # Manifest sempre aggiornato a /latest.json
          scp -i ~/.ssh/id_ed25519 dist/latest.json "$VPS_USER@$VPS_HOST:$REMOTE_DIR/latest.json"
          # Symlink "latest" → ultima versione (per URL stabili)
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" \
            "cd $REMOTE_DIR && ln -sfn v${{ steps.meta.outputs.version }} latest"
          echo "✅ Deploy v${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.channel }}) completato"

      - name: Notify radiokit.io admin
        env:
          VPS_USER: ${{ secrets.RADIOKIT_VPS_USER }}
          VPS_HOST: ${{ secrets.RADIOKIT_VPS_HOST }}
        run: |
          # Notifica admin: invalida cache, log nuova release
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" \
            "curl -s 'http://127.0.0.1/api/admin/release-published.php?product=regia&version=${{ steps.meta.outputs.version }}&channel=${{ steps.meta.outputs.channel }}' || true"
