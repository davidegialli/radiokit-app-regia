<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>App Regia RadioBOSS — RadioKit</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body, #root { height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: radial-gradient(ellipse at center, oklch(0.14 0.005 260) 0%, oklch(0.08 0.003 260) 100%);
    }
    .scaler {
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="overlays.jsx"></script>
  <script type="text/babel" src="screen-nowplaying.jsx"></script>
  <script type="text/babel" src="screen-dashboard.jsx"></script>
  <script type="text/babel" src="screen-other.jsx"></script>
  <script type="text/babel" src="screen-stream.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function Mount() {
      const wrapRef = useRef(null);
      const [scale, setScale] = useState(1);
      useEffect(() => {
        const fit = () => {
          const w = window.innerWidth - 40;
          const h = window.innerHeight - 40;
          const s = Math.min(w / 412, h / 892, 1);
          setScale(s);
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return (
        <div ref={wrapRef} style={{
          width: 412 * scale, height: 892 * scale,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }} data-screen-label="App Regia">
          <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
            <AndroidDeviceDark width={412} height={892}>
              <RegiaApp/>
            </AndroidDeviceDark>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Mount/>);
  </script>
</body>
</html>
